spring.application.name=TCC

# Configurań§es de banco de dados
spring.datasource.url=jdbc:mysql://localhost:3306/cadastro
spring.datasource.username=${DB_USUARIO}
spring.datasource.password=${DB_SENHA}

# Desliga logs do Spring no arquivo
logging.level.org.springframework=ERROR
logging.level.org.hibernate=ERROR

logging.level.com.example=INFO
logging.file.name=logs/app.log

spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}

spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Configurań§es para HTTPS
server.port=8443
server.ssl.key-store=classpath:keystore.p12
server.ssl.key-store-password=${KEYSTORE_PASSWORD}
server.ssl.key-store-type=PKCS12
server.ssl.key-alias=tcc