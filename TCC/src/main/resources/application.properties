spring.application.name=TCC

spring.config.import=optional:file:.env[.properties]

# Configurań§es de banco de dados
spring.datasource.url=${DB_URL}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# SMTP
spring.mail.host=smtp-relay.brevo.com
spring.mail.port=587
spring.mail.username=${BREVO_USERNAME}
spring.mail.password=${BREVO_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true


#spring.mail.protocol=smtps
#spring.mail.properties.mail.smtp.auth=true
#spring.mail.properties.mail.smtp.ssl.enable=true
#spring.mail.properties.mail.smtp.ssl.required=true
#spring.mail.properties.mail.smtp.connectiontimeout=15000
#spring.mail.properties.mail.smtp.timeout=15000
#spring.mail.properties.mail.smtp.writetimeout=15000
spring.mail.properties.mail.debug=true

# HIKARICP
spring.datasource.hikari.pool-name=TravelBuddyPool
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.max-lifetime=1800000


# Desliga logs do Spring no arquivo
logging.level.org.springframework=ERROR
logging.level.org.hibernate=ERROR
logging.level.com.example=INFO
logging.file.name=logs/app.log

#HTTPS
server.port=8443
server.ssl.key-store=classpath:keystore.p12
server.ssl.key-store-password=${KEYSTORE_PASSWORD}
server.ssl.key-store-type=PKCS12
server.ssl.key-alias=tcc

spring.thymeleaf.cache=false