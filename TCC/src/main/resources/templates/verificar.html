<!DOCTYPE html>
<html>
<head>
    <title>Verificação 2FA</title>
</head>
<body>

    <h2>Digite o código enviado para seu email</h2>

    <form th:action="@{/verificar}" method="post">
        <input type="text" name="codigo" placeholder="Digite o código" required>
        <button type="submit">Verificar</button>
    </form>

    <p th:if="${erro}" th:text="${erro}" style="color:red;"></p>

</body>
</html>
