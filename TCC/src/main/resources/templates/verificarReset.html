<!DOCTYPE html>
<html>
<head>
    <title>Verificação 2FA para resetar senha</title>

    <link rel="stylesheet" th:href="@{/css/verificarResetStyle.css}">
    <link rel="stylesheet" th:href="@{/css/navStyle.css}">
    <link rel="stylesheet" th:href="@{/css/footerStyle.css}">

</head>

<body>

    <div th:replace="fragments/nav :: nav"></div>

    <main>

        <h2 class="title">Verificação duas etapas</h2>

        <form th:action="@{/ResetVerificar}" method="post" class="form-verificacao">

            <label class="label_info">Código de verificação</label>

            <input type="text" name="codigo" placeholder="Digite o código envia ao seu Email" required class="textbox">

            <button type="submit" class="Sendbutton">Verificar</button>

        </form>

        <p th:if="${erro}" th:text="${erro}" class="mensagemErro"></p>

    </main>

    <div th:replace="fragments/footer :: footer"></div>

</body>
</html>
