<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" th:href="@{/css/ResetPasswordStyle.css}">
    <link rel="stylesheet" th:href="@{/css/navStyle.css}">
    <title>Document</title>
</head>
<body>
    <div th:replace="fragments/nav :: nav"></div>

    <h1 class="title">Recuperar Senha</h1>
    <form action="/reset" th:object="${reset}" method="post" class="form-reset">
        
        <label class="label_info">Senha:</label>
        <input name="senha" th:value="${senha}" type="password" required class="textbox" pattern="^(?=.*[A-Z])(?=.*[a-z])(?=.*\d)(?=.*[@#$%^&+=!]).{8,}$" title="A senha deve ter pelo menos 8 caracteres, incluindo maiúscula, minúscula, número e caractere especial">

        <label class="label_info">Reescreva a Senha:</label>
        <input name="confirmarSenha" th:value="${ConfirmarSenha}" type="password" required class="textbox" pattern="^(?=.*[A-Z])(?=.*[a-z])(?=.*\d)(?=.*[@#$%^&+=!]).{8,}$" title="A senha deve ter pelo menos 8 caracteres, incluindo maiúscula, minúscula, número e caractere especial">

        <button type="submit" class="Sendbutton">Entrar</button>
        <p name="mensagemDeErro" th:text="${mensagemDeErro}"></p>
        
        <a href="/login" class="link_pull">Ja tem cadastro em nossa plataforma? clique aqui para Logar</a>
        <a href="/Subscription" class="link_pull">Ainda não está cadastrado em nossa plataforma? clique aqui para Registrar</a>
        
    </form>
</body>
</html>
